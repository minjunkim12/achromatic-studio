<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oopy Blocks · Achromatic.</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>

/* ═══ BRAND TOKENS ═══════════════════════════════════════════ */
:root {
  --p:#0064FF; --ph:#0052D4; --pp:#0046B8;
  --pt:#eaf1ff; --ps:#d3e3ff;
  --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0;
  --s300:#cbd5e1; --s400:#94a3b8; --s500:#64748b;
  --s600:#475569; --s700:#334155; --s800:#1e293b; --s900:#0f172a;
  --tx1:#0f172a; --tx2:#334155; --tx3:#64748b; --tx4:#94a3b8;
  --bg:#fff; --bgc:#f8fafc; --bgt:#eaf1ff;
  --bd:#e2e8f0; --bds:#eef2f7;
  --ok:#15c47e; --warn:#fe9800; --err:#f04452;
  --rXS:4px; --rS:8px; --rM:12px; --rL:16px; --rXL:20px; --rPill:999px;
  --shSm:0 1px 2px rgba(15,23,42,.04);
  --shCard:0 2px 12px rgba(15,23,42,.06);
  --shPop:0 8px 24px rgba(15,23,42,.10);
  --shDeep:0 20px 48px rgba(15,23,42,.14);
  --ring:0 0 0 3px rgba(0,100,255,.18);
  --gradB:linear-gradient(135deg,#0064FF 0%,#3b82f6 100%);
  --gradInk:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);
  --gradGlow:radial-gradient(ellipse at center,rgba(0,100,255,.18) 0%,rgba(0,100,255,0) 70%);
  --ease:cubic-bezier(.2,0,0,1);
  --easeOut:cubic-bezier(.16,1,.3,1);
  --dMicro:120ms; --dBase:200ms; --dEnter:320ms;
  --font:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
  --sidebar-w:256px;
  --topnav-h:56px;
}

/* ═══ RESET ══════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; height:100% }
body { font-family:var(--font); font-size:15px; line-height:1.5; color:var(--tx2); background:var(--bgc); height:100%; overflow:hidden }
a { color:inherit; text-decoration:none }
button { font-family:inherit; cursor:pointer; border:none; background:none }
img { max-width:100%; display:block }

/* ═══ APP SHELL ══════════════════════════════════════════════ */
.app {
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-rows:var(--topnav-h) 1fr;
  grid-template-areas:
    "sidebar topnav"
    "sidebar main";
  height:100vh;
  overflow:hidden;
}

/* ═══ SIDEBAR ════════════════════════════════════════════════ */
.sidebar {
  grid-area:sidebar;
  background:var(--bg);
  border-right:1px solid var(--bd);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:sticky;
  top:0;
  overflow-y:auto;
  overflow-x:hidden;
  z-index:20;
}

/* Sidebar scrollbar */
.sidebar::-webkit-scrollbar { width:4px }
.sidebar::-webkit-scrollbar-track { background:transparent }
.sidebar::-webkit-scrollbar-thumb { background:var(--s200); border-radius:2px }

/* Logo area */
.sidebar-logo {
  display:flex;
  align-items:center;
  gap:10px;
  padding:18px 18px 14px;
  border-bottom:1px solid var(--bds);
  flex-shrink:0;
}
.sidebar-logo-mark {
  width:30px; height:30px;
  background:var(--p);
  border-radius:8px;
  display:grid; place-items:center;
  flex-shrink:0;
  box-shadow:0 3px 8px rgba(0,100,255,.32);
}
.sidebar-logo-mark svg { width:15px; height:15px; stroke:#fff; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round }
.sidebar-brand { font-size:15px; font-weight:800; letter-spacing:-.03em; color:var(--tx1) }
.sidebar-brand span { color:var(--p) }

/* Nav area */
.sidebar-nav { padding:12px 10px; flex:1 }

.sidebar-nav-item {
  display:flex;
  align-items:center;
  gap:9px;
  padding:8px 10px;
  border-radius:var(--rM);
  cursor:pointer;
  transition:background var(--dMicro) var(--ease), color var(--dMicro) var(--ease);
  color:var(--tx3);
  font-size:13.5px;
  font-weight:600;
  line-height:1.3;
  position:relative;
}
.sidebar-nav-item:hover { background:var(--s50); color:var(--tx1) }
.sidebar-nav-item.active {
  background:var(--pt);
  color:var(--p);
}
.sidebar-nav-item.active .sidebar-nav-icon { opacity:1 }
.sidebar-nav-item--soon { cursor:default; opacity:.55 }
.sidebar-nav-item--soon:hover { background:transparent; color:var(--tx3) }

.sidebar-nav-icon {
  font-size:15px;
  line-height:1;
  flex-shrink:0;
  width:20px;
  text-align:center;
}
.sidebar-nav-label { flex:1; min-width:0 }
.sidebar-nav-count {
  font-size:10px;
  font-weight:700;
  color:var(--tx4);
  background:var(--s100);
  padding:1px 7px;
  border-radius:var(--rPill);
  flex-shrink:0;
}
.sidebar-nav-item.active .sidebar-nav-count {
  background:var(--ps);
  color:var(--p);
}
.sidebar-nav-soon {
  font-size:9px;
  font-weight:800;
  color:var(--tx4);
  background:var(--s100);
  padding:1px 6px;
  border-radius:var(--rPill);
  letter-spacing:.04em;
}

/* Group label */
.sidebar-group { margin-top:16px }
.sidebar-group-label {
  font-size:10px;
  font-weight:800;
  color:var(--tx4);
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:4px 10px 8px;
}

/* Sidebar divider */
.sidebar-divider { height:1px; background:var(--bds); margin:12px 10px }

/* Sidebar bottom */
.sidebar-bottom {
  padding:12px 10px 16px;
  border-top:1px solid var(--bds);
  flex-shrink:0;
}
.sidebar-bottom-link {
  display:flex;
  align-items:center;
  gap:9px;
  padding:7px 10px;
  border-radius:var(--rM);
  font-size:12.5px;
  font-weight:600;
  color:var(--tx4);
  cursor:pointer;
  transition:background var(--dMicro), color var(--dMicro);
}
.sidebar-bottom-link:hover { background:var(--s50); color:var(--tx2) }
.sidebar-bottom-link svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; flex-shrink:0 }

/* ═══ TOP NAV ════════════════════════════════════════════════ */
.topnav {
  grid-area:topnav;
  background:var(--bg);
  border-bottom:1px solid var(--bd);
  display:flex;
  align-items:center;
  padding:0 28px;
  gap:16px;
  height:var(--topnav-h);
  position:sticky;
  top:0;
  z-index:10;
}

.topnav-title {
  font-size:14px;
  font-weight:700;
  color:var(--tx1);
  letter-spacing:-.02em;
  flex-shrink:0;
}
.topnav-sep {
  width:1px;
  height:16px;
  background:var(--bd);
  flex-shrink:0;
}

/* Search bar */
.search-wrap {
  flex:1;
  max-width:380px;
  position:relative;
}
.search-icon {
  position:absolute;
  left:11px; top:50%;
  transform:translateY(-50%);
  width:14px; height:14px;
  stroke:var(--tx4);
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  pointer-events:none;
}
.search-input {
  width:100%;
  padding:7px 12px 7px 32px;
  border:1.5px solid var(--bd);
  border-radius:var(--rPill);
  font-family:var(--font);
  font-size:13px;
  color:var(--tx1);
  background:var(--bgc);
  transition:border-color var(--dMicro), box-shadow var(--dMicro), background var(--dMicro);
  outline:none;
}
.search-input::placeholder { color:var(--tx4) }
.search-input:focus {
  border-color:var(--p);
  background:var(--bg);
  box-shadow:var(--ring);
}
.search-kbd {
  position:absolute;
  right:10px; top:50%;
  transform:translateY(-50%);
  font-size:10px;
  font-weight:700;
  color:var(--tx4);
  background:var(--s100);
  border:1px solid var(--s200);
  padding:1px 5px;
  border-radius:4px;
  pointer-events:none;
  letter-spacing:.02em;
}

.topnav-spacer { flex:1 }

/* Block count pill */
.topnav-count {
  display:flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:700;
  color:var(--tx3);
  background:var(--s100);
  padding:4px 12px;
  border-radius:var(--rPill);
  flex-shrink:0;
}
.topnav-count-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--ok);
}

/* Theme badge */
.topnav-theme-badge {
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  font-weight:800;
  color:var(--p);
  background:var(--pt);
  padding:4px 10px;
  border-radius:var(--rPill);
  flex-shrink:0;
  letter-spacing:-.01em;
}

/* ═══ MAIN CONTENT ═══════════════════════════════════════════ */
.main {
  grid-area:main;
  overflow-y:auto;
  overflow-x:hidden;
  height:calc(100vh - var(--topnav-h));
  background:var(--bgc);
}

/* Main scrollbar */
.main::-webkit-scrollbar { width:6px }
.main::-webkit-scrollbar-track { background:transparent }
.main::-webkit-scrollbar-thumb { background:var(--s200); border-radius:3px }
.main::-webkit-scrollbar-thumb:hover { background:var(--s300) }

/* Content inner padding */
.main-inner {
  max-width:1060px;
  padding:32px 28px 80px;
}

/* Section header */
.section-hd {
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-bottom:20px;
  padding-bottom:14px;
  border-bottom:1px solid var(--bd);
}
.section-title {
  font-size:18px;
  font-weight:800;
  color:var(--tx1);
  letter-spacing:-.03em;
  line-height:1.2;
}
.section-desc {
  font-size:12.5px;
  color:var(--tx3);
  flex:1;
}
.section-count-badge {
  font-size:11px;
  font-weight:700;
  color:var(--tx3);
  background:var(--s100);
  padding:2px 9px;
  border-radius:var(--rPill);
}

/* Category heading inside a section */
.cat-hd {
  display:flex;
  align-items:center;
  gap:8px;
  margin:28px 0 14px;
}
.cat-hd-label {
  font-size:11px;
  font-weight:800;
  color:var(--tx4);
  letter-spacing:.12em;
  text-transform:uppercase;
}
.cat-hd-line { flex:1; height:1px; background:var(--bds) }
.cat-hd-count {
  font-size:10px;
  font-weight:700;
  color:var(--tx4);
  background:var(--s100);
  padding:1px 7px;
  border-radius:var(--rPill);
}

/* ═══ BLOCK CARD ══════════════════════════════════════════════ */
.block-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:12px;
}
.blk {
  border-radius:var(--rL);
  background:var(--bg);
  border:1px solid var(--bd);
  overflow:hidden;
  transition:box-shadow var(--dBase) var(--ease), transform var(--dBase) var(--ease), border-color var(--dBase) var(--ease);
}
.blk:hover {
  box-shadow:var(--shPop);
  transform:translateY(-2px);
  border-color:var(--s300);
}

/* Card preview body */
.blk-body {
  padding:20px;
  min-height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bgc);
  position:relative;
  overflow:hidden;
}
.blk-body--tall { min-height:220px }
.blk-body--nav { padding:0; background:var(--s50); min-height:0 }

/* Card meta bar */
.blk-meta {
  padding:10px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-top:1px solid var(--bds);
  gap:8px;
  background:var(--bg);
}
.blk-name {
  font-size:12px;
  font-weight:700;
  color:var(--tx1);
  letter-spacing:-.01em;
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.blk-badge {
  font-size:10px;
  font-weight:700;
  color:var(--tx3);
  background:var(--s100);
  padding:2px 7px;
  border-radius:var(--rPill);
  flex-shrink:0;
}

/* Copy button */
.copy-btn {
  display:flex;
  align-items:center;
  gap:5px;
  padding:6px 12px;
  background:var(--p);
  color:#fff;
  border-radius:var(--rS);
  font-size:11.5px;
  font-weight:700;
  transition:all var(--dBase) var(--ease);
  white-space:nowrap;
  flex-shrink:0;
}
.copy-btn:hover {
  background:var(--ph);
  transform:translateY(-1px);
  box-shadow:0 3px 10px rgba(0,100,255,.3);
}
.copy-btn svg {
  width:11px; height:11px;
  stroke:currentColor;
  fill:none;
  stroke-width:2.5;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ═══ BLOCK PREVIEW INTERNAL STYLES (inside card) ═══════════ */
/* — used by the mini-component previews — */
.nav-preview-wrap { padding:12px; width:100% }
.nav-duals { display:grid; grid-template-columns:3fr 1fr; gap:12px; align-items:start }
.preview-label { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--tx4); margin-bottom:6px; text-align:center }

.bf { border:1.5px solid var(--bd); border-radius:9px; overflow:hidden }
.bf-bar { background:var(--s100); padding:6px 9px; display:flex; align-items:center; gap:6px; border-bottom:1px solid var(--bd) }
.bf-dots { display:flex; gap:4px }
.bf-dot { width:7px; height:7px; border-radius:50% }
.bf-dot:nth-child(1){background:#ff5f57} .bf-dot:nth-child(2){background:#febc2e} .bf-dot:nth-child(3){background:#28c840}
.bf-url { flex:1; background:#fff; border-radius:3px; height:16px; padding:0 7px; font-size:8px; display:flex; align-items:center; color:var(--tx3); border:1px solid var(--bd) }
.bf-content { overflow:hidden; height:80px; position:relative; background:#fff }
.bf-scaled { transform:scale(0.48); transform-origin:top left; width:208.33%; pointer-events:none }

.pf-wrap { display:flex; flex-direction:column; align-items:center; gap:5px }
.pf { border:2.5px solid var(--s800); border-radius:20px; overflow:hidden; background:var(--s800); padding:4px 4px 7px; width:80px }
.pf-notch { width:28px; height:5px; background:var(--s700); border-radius:3px; margin:0 auto 3px }
.pf-screen { border-radius:14px; overflow:hidden; background:#fff; height:128px }
.pf-scaled { transform:scale(0.23); transform-origin:top left; width:435%; pointer-events:none }

/* Block preview component classes (embedded in card body) */
.pv-callout { background:var(--pt); border-radius:var(--rL); padding:13px 16px; display:flex; align-items:flex-start; gap:9px; border-left:3px solid var(--p); width:100% }
.pv-callout__icon { font-size:17px; flex-shrink:0; margin-top:1px }
.pv-callout__label { font-size:10px; font-weight:800; color:var(--p); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px }
.pv-callout__body { font-size:12px; color:var(--tx2); line-height:1.55 }

.pv-quote { padding:18px; border-radius:var(--rL); background:var(--bg); box-shadow:var(--shCard); position:relative; overflow:hidden; width:100% }
.pv-quote::before { content:'"'; position:absolute; top:-10px; left:12px; font-size:80px; color:var(--p); opacity:.07; font-family:Georgia,serif; line-height:1; pointer-events:none }
.pv-quote__text { font-size:12px; font-weight:600; color:var(--tx1); line-height:1.6; margin-bottom:8px; position:relative }
.pv-quote__author { font-size:10px; color:var(--tx3) }

.pv-warn { background:#fff8ed; border-radius:var(--rL); padding:13px 16px; display:flex; align-items:flex-start; gap:9px; border-left:3px solid var(--warn); width:100% }
.pv-warn__label { font-size:10px; font-weight:800; color:var(--warn); margin-bottom:3px; letter-spacing:.06em; text-transform:uppercase }
.pv-warn__body { font-size:12px; color:var(--tx2); line-height:1.55 }

.pv-stat-row { display:flex; gap:9px; width:100% }
.pv-stat { flex:1; background:var(--bg); border-radius:var(--rL); padding:12px 9px; box-shadow:var(--shCard); text-align:center }
.pv-stat__val { font-size:20px; font-weight:800; letter-spacing:-.04em; color:var(--tx1); line-height:1 }
.pv-stat__lbl { font-size:9px; color:var(--tx3); margin-top:3px }
.pv-stat__delta { font-size:10px; font-weight:700; color:var(--ok); margin-top:3px }

.pv-counter { background:var(--gradB); border-radius:var(--rXL); padding:20px 14px; display:flex; gap:8px; justify-content:space-around; width:100% }
.pv-counter__item { text-align:center; color:#fff }
.pv-counter__num { font-size:24px; font-weight:800; letter-spacing:-.04em; line-height:1; font-variant-numeric:tabular-nums }
.pv-counter__lbl { font-size:9px; opacity:.7; margin-top:3px }

.pv-hero { background:var(--bgc); border-radius:var(--rXL); padding:22px 18px; text-align:center; width:100% }
.pv-hero__badge { display:inline-flex; align-items:center; background:var(--pt); color:var(--p); font-size:9px; font-weight:800; padding:3px 9px; border-radius:var(--rPill); margin-bottom:9px; letter-spacing:.04em }
.pv-hero__h { font-size:16px; font-weight:800; color:var(--tx1); letter-spacing:-.03em; margin-bottom:5px; line-height:1.25 }
.pv-hero__p { font-size:11px; color:var(--tx3); line-height:1.6; margin-bottom:13px }
.pv-hero__btns { display:flex; gap:7px; justify-content:center; flex-wrap:wrap }

.pv-btn { display:inline-flex; align-items:center; justify-content:center; padding:0 11px; height:26px; border-radius:var(--rM); font-size:10px; font-weight:700; font-family:inherit; white-space:nowrap }
.pv-btn--p { background:var(--p); color:#fff }
.pv-btn--w { background:var(--pt); color:var(--p) }
.pv-btn--g { background:var(--s100); color:var(--tx1) }

.pv-price { border-radius:var(--rL); overflow:hidden; border:1px solid var(--bd); width:100% }
.pv-price table { width:100%; border-collapse:collapse; font-size:10px }
.pv-price th { background:var(--s50); padding:7px 10px; text-align:left; font-size:9px; font-weight:800; color:var(--tx3); letter-spacing:.06em; border-bottom:1px solid var(--bd) }
.pv-price td { padding:7px 10px; border-bottom:1px solid var(--bds); color:var(--tx2) }
.pv-price tr:last-child td { border-bottom:none }
.pv-price .ck { color:var(--ok); font-weight:800 }
.pv-price .xx { color:var(--err) }
.pv-price .badge-plan { display:inline-block; background:var(--pt); color:var(--p); font-size:9px; font-weight:700; padding:1px 6px; border-radius:var(--rPill) }

.pv-cta { background:var(--gradB); border-radius:var(--rXL); padding:20px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; width:100% }
.pv-cta__h { font-size:13px; font-weight:800; color:#fff; margin-bottom:3px; letter-spacing:-.01em }
.pv-cta__p { font-size:10px; color:rgba(255,255,255,.7) }

.pv-cta-card { background:var(--bgc); border-radius:var(--rXL); padding:24px; text-align:center; width:100%; border:1px solid var(--bd) }
.pv-cta-card__icon { font-size:26px; margin-bottom:9px }
.pv-cta-card__h { font-size:14px; font-weight:800; color:var(--tx1); margin-bottom:5px; letter-spacing:-.02em }
.pv-cta-card__p { font-size:11px; color:var(--tx3); margin-bottom:12px; line-height:1.5 }

.pv-badge { display:flex; flex-direction:column; align-items:center; gap:10px; width:100% }
.pv-badge-svg .seal-circ { fill:none; stroke:var(--p); stroke-width:4; stroke-linecap:round; stroke-dasharray:251; stroke-dashoffset:251; transform-origin:center; animation:draw-circ 2.5s cubic-bezier(.4,0,.2,1) infinite, rot-circ 2.5s cubic-bezier(.4,0,.2,1) infinite; opacity:.35 }
.pv-badge-svg .seal-chk { fill:none; stroke:var(--p); stroke-width:8; stroke-linecap:round; stroke-linejoin:round; opacity:0; transform-origin:center; animation:pop-chk 2.5s cubic-bezier(.34,1.56,.64,1) infinite }
.pv-badge__label { font-size:10px; font-weight:800; color:var(--p); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px }
.pv-badge__h { font-size:12px; font-weight:800; color:var(--tx1); line-height:1.3; text-align:center }

.pv-glow { border-radius:var(--rXL); padding:20px; background:var(--bg); position:relative; overflow:hidden; width:100%; animation:glow-pulse 3s ease-in-out infinite }
.pv-glow::before { content:''; position:absolute; inset:-40%; background:var(--gradGlow); animation:grad-flow 5s ease infinite; background-size:200% 200%; pointer-events:none }
.pv-glow__inner { position:relative }
.pv-glow__icon { width:38px; height:38px; background:var(--pt); border-radius:var(--rM); display:grid; place-items:center; margin-bottom:10px; font-size:17px }

/* ═══ KEYFRAMES ══════════════════════════════════════════════ */
@keyframes draw-circ { 0%{stroke-dashoffset:251} 60%,100%{stroke-dashoffset:0} }
@keyframes rot-circ { 0%{transform:rotate(-90deg)} 100%{transform:rotate(270deg)} }
@keyframes pop-chk { 0%,55%{opacity:0;transform:scale(.5)} 70%{opacity:1;transform:scale(1.15)} 80%,100%{opacity:1;transform:scale(1)} }
@keyframes float-y { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

@keyframes grad-flow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes slide-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

</div></div>`;

  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;flex-wrap:wrap">
    <div><div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:5px">${v.brand}</div><div style="font-size:12px;color:#64748b">${v.tagline}</div></div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">${links.map(l=>`<a href="${l.u}" style="font-size:13px;color:#64748b;text-decoration:none">${l.t}</a>`).join('')}</div>
  </div>
  <div style="height:1px;background:#334155;margin-bottom:16px"></div>
  <div style="font-size:11px;color:#475569">${v.copy}</div>
</footer></div>`;
}},

}; /* end BLOCK_DEFS */
</script>

<!-- ════ PART 3: RUNTIME JS (navigation, modal, copy) ════ -->
<script>
'use strict';

/* ── 현재 섹션 상태 ─────────────────────────────────────── */
let currentSection = 'all';
let currentBlockId = null;

/* ── 섹션 메타 ──────────────────────────────────────────── */
const SECTION_META = {
  'all':          { title:'전체 블록',    theme:'🗂 우피 블록' },
  'oopy-header':  { title:'헤더 블록',   theme:'🗂 우피 · 헤더' },
  'oopy-content': { title:'콘텐츠 블록', theme:'🗂 우피 · 콘텐츠' },
  'oopy-footer':  { title:'푸터 블록',   theme:'🗂 우피 · 푸터' },
};

/* ── 초기화 ─────────────────────────────────────────────── */
function init() {
  renderCounts();
  navigate('all');
  bindKeyboard();
}

/* ── 카운트 뱃지 업데이트 ────────────────────────────────── */
function renderCounts() {
  let total = 0;
  BLOCK_SECTIONS.forEach(sec => {
    const n = sec.blocks.length;
    total += n;
    const el = document.getElementById('count-' + sec.id);
    if (el) el.textContent = n;
  });
  const allEl = document.getElementById('count-all');
  if (allEl) allEl.textContent = total;
  document.getElementById('topnav-count-num').textContent = total;
}

/* ── 네비게이션 ─────────────────────────────────────────── */
function navigate(sectionId) {
  currentSection = sectionId;

  /* sidebar active 상태 */
  document.querySelectorAll('.sidebar-nav-item[data-section]').forEach(el => {
    el.classList.toggle('active', el.dataset.section === sectionId);
  });

  /* topnav 텍스트 업데이트 */
  const meta = SECTION_META[sectionId] || { title: sectionId, theme: '' };
  document.getElementById('topnav-title').textContent = meta.title;
  document.getElementById('topnav-theme').textContent = meta.theme;

  /* search 리셋 */
  document.getElementById('search-input').value = '';

  /* 콘텐츠 렌더 */
  renderContent(sectionId);

  /* 모바일: 사이드바 닫기 */
  closeSidebar();
}

/* ── 콘텐츠 렌더 ─────────────────────────────────────────── */
function renderContent(sectionId) {
  const container = document.getElementById('main-inner');
  container.innerHTML = '';

  /* 렌더할 섹션 결정 */
  const sectionsToRender = sectionId === 'all'
    ? BLOCK_SECTIONS
    : BLOCK_SECTIONS.filter(s => s.id === sectionId);

  if (sectionsToRender.length === 0 || sectionsToRender.every(s => s.blocks.length === 0)) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-title">블록이 없습니다</div>
        <div class="empty-state-desc">이 섹션에는 아직 블록이 추가되지 않았습니다.</div>
      </div>`;
    return;
  }

  sectionsToRender.forEach(sec => {
    if (sec.blocks.length === 0) return;

    /* section header */
    const hd = document.createElement('div');
    hd.className = 'section-hd';
    hd.innerHTML = `
      <div class="section-title">${sec.title}</div>
      <div class="section-desc">${sec.desc || ''}</div>
      <span class="section-count-badge">${sec.blocks.length}개</span>
    `;
    container.appendChild(hd);

    /* 카테고리 그룹 별로 */
    const groups = {};
    sec.blocks.forEach(b => {
      const g = b.group || '기타';
      if (!groups[g]) groups[g] = [];
      groups[g].push(b);
    });

    Object.entries(groups).forEach(([groupName, blocks]) => {
      /* category heading */
      if (Object.keys(groups).length > 1) {
        const catHd = document.createElement('div');
        catHd.className = 'cat-hd';
        catHd.innerHTML = `
          <span class="cat-hd-label">${groupName}</span>
          <div class="cat-hd-line"></div>
          <span class="cat-hd-count">${blocks.length}</span>
        `;
        container.appendChild(catHd);
      }

      /* block grid */
      const grid = document.createElement('div');
      grid.className = 'block-grid';
      blocks.forEach(b => {
        grid.appendChild(createCard(b));
      });
      container.appendChild(grid);
    });

    /* spacer between sections */
    const spacer = document.createElement('div');
    spacer.style.height = '24px';
    container.appendChild(spacer);
  });

  /* scroll to top */
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 카드 생성 ──────────────────────────────────────────── */
function createCard(blockDef) {
  const card = document.createElement('div');
  card.className = 'blk';
  card.dataset.blockId = blockDef.id;
  card.dataset.name = (blockDef.name || '').toLowerCase();

  card.innerHTML = `
    <div class="blk-body${blockDef.bodyClass ? ' ' + blockDef.bodyClass : ''}">
      ${blockDef.preview || ''}
    </div>
    <div class="blk-meta">
      <div class="blk-name">${blockDef.name}</div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="blk-badge">${blockDef.badge || ''}</span>
        <button class="copy-btn" onclick="openModal('${blockDef.id}')">
          <svg viewBox="0 0 12 12"><rect x="4" y="4" width="7" height="7" rx="1.5"/><path d="M2 8H1.5A1.5 1.5 0 010 6.5v-5A1.5 1.5 0 011.5 0h5A1.5 1.5 0 018 1.5V2"/></svg>
          편집 후 복사
        </button>
      </div>
    </div>
  `;
  return card;
}

/* ── 검색 ────────────────────────────────────────────────── */
function handleSearch(query) {
  const q = query.toLowerCase().trim();
  const cards = document.querySelectorAll('.blk[data-block-id]');
  let visible = 0;

  cards.forEach(card => {
    const name = card.dataset.name || '';
    const match = !q || name.includes(q);
    card.dataset.hidden = match ? 'false' : 'true';
    if (match) visible++;
  });

  /* empty state */
  let emptyEl = document.getElementById('search-empty');
  if (!emptyEl) {
    emptyEl = document.createElement('div');
    emptyEl.id = 'search-empty';
    emptyEl.className = 'empty-state';
    emptyEl.innerHTML = `
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-title">검색 결과가 없습니다</div>
      <div class="empty-state-desc">"<strong id="search-query-disp"></strong>" 에 맞는 블록을 찾지 못했습니다.</div>
    `;
    document.getElementById('main-inner').appendChild(emptyEl);
  }
  emptyEl.style.display = (q && visible === 0) ? 'flex' : 'none';
  if (q) {
    const disp = document.getElementById('search-query-disp');
    if (disp) disp.textContent = query;
  }
}

/* ── 모달 열기 ───────────────────────────────────────────── */
function openModal(blockId) {
  const def = BLOCK_DEFS[blockId];
  if (!def) return;
  currentBlockId = blockId;

  document.getElementById('modal-title').textContent = def.name;
  const fieldsContainer = document.getElementById('modal-fields');
  fieldsContainer.innerHTML = '';

  (def.fields || []).forEach(f => {
    const fld = document.createElement('div');
    fld.className = 'fld';
    fld.innerHTML = `
      <label class="fld-lbl">${f.label}</label>
      ${f.type === 'textarea'
        ? `<textarea class="fld-inp" id="fld-${f.id}" rows="3">${f.default || ''}</textarea>`
        : `<input class="fld-inp" id="fld-${f.id}" type="text" value="${f.default || ''}">`
      }
      ${f.hint ? `<div class="fld-hint">${f.hint}</div>` : ''}
    `;
    fieldsContainer.appendChild(fld);
  });

  document.getElementById('modal-overlay').classList.add('open');
  /* focus first input */
  const first = fieldsContainer.querySelector('.fld-inp');
  if (first) setTimeout(() => first.focus(), 100);
}

/* ── 모달 닫기 ───────────────────────────────────────────── */
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentBlockId = null;
}
function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

/* ── 복사하기 ────────────────────────────────────────────── */
function copyBlock() {
  const def = BLOCK_DEFS[currentBlockId];
  if (!def) return;

  /* 필드값 수집 */
  const vals = {};
  (def.fields || []).forEach(f => {
    const el = document.getElementById('fld-' + f.id);
    vals[f.id] = el ? el.value : (f.default || '');
  });

  /* HTML 생성 */
  const html = def.template(vals);

  /* ```html 코드블록 형식으로 래핑 → 노션/우피 호환 */
  const codeBlock = '```html\n' + html + '\n```';

  navigator.clipboard.writeText(codeBlock).then(() => {
    closeModal();
    showToast();
  }).catch(() => {
    /* fallback */
    const ta = document.createElement('textarea');
    ta.value = codeBlock;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    closeModal();
    showToast();
  });
}

/* ── 토스트 ──────────────────────────────────────────────── */
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── 키보드 단축키 ───────────────────────────────────────── */
function bindKeyboard() {
  document.addEventListener('keydown', e => {
    /* Esc: 모달 닫기 */
    if (e.key === 'Escape') closeModal();
    /* ⌘K / Ctrl+K: 검색 포커스 */
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('search-input').focus();
    }
  });
}

/* ── 모바일 사이드바 ─────────────────────────────────────── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.remove('open');
  ov.classList.remove('open');
}

/* ── 앱 부트 ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
