<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KMU · 졸업요건</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
:root {
  --blue-45: oklch(0.624 0.176 254);
  --blue-95: oklch(0.965 0.020 250);
  --tx-900: oklch(15% 0.015 254);
  --tx-700: oklch(30% 0.018 254);
  --tx-500: oklch(50% 0.015 254);
  --tx-400: oklch(65% 0.010 254);
  --bg: oklch(100% 0 0);
  --bg-sub: oklch(98% 0.005 254);
  --line: oklch(92% 0.010 254);
  --green: oklch(55% 0.20 145);
  --green-weak: oklch(95% 0.04 145);
  --red: oklch(55% 0.22 25);
  --red-weak: oklch(97% 0.04 25);
  --yellow-weak: oklch(97% 0.04 85);
  --yellow-tx: oklch(45% 0.12 85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard Variable', -apple-system, sans-serif; background: var(--bg); color: var(--tx-700); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; padding: 6px 2px; }
.section-label { font-size: 12px; font-weight: 600; color: var(--tx-400); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
.badge { display: inline-flex; align-items: center; font-weight: 600; border-radius: 20px; font-size: 12px; padding: 2px 8px; white-space: nowrap; }
.badge-green { background: var(--green-weak); color: var(--green); }
.badge-red { background: var(--red-weak); color: var(--red); }
.badge-blue { background: var(--blue-95); color: var(--blue-45); }
.badge-yellow { background: var(--yellow-weak); color: var(--yellow-tx); }
.req { margin-bottom: 12px; }
.req-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.req-name { font-size: 14px; font-weight: 600; color: var(--tx-900); }
.req-num { font-size: 13px; color: var(--tx-500); font-variant-numeric: tabular-nums; }
.req-bar { height: 6px; background: var(--bg-sub); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
.req-fill { height: 100%; border-radius: 999px; background: var(--blue-45); }
.req-fill.done { background: var(--green); }
.divider { height: 1px; background: var(--line); margin: 16px 0 14px; }
.retake { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
.retake:last-child { border-bottom: none; padding-bottom: 0; }
.retake-name { font-size: 15px; font-weight: 600; color: var(--tx-900); }
.retake-sub { font-size: 13px; color: var(--tx-500); margin-top: 1px; }
</style>
</head>
<body>
  <div class="section-label">졸업요건 · 영역별 (이수 / 요구)</div>
  <div class="req">
    <div class="req-head"><span class="req-name">기초교양</span><span class="req-num">8 / 7 <span class="badge badge-green">충족</span></span></div>
    <div class="req-bar"><div class="req-fill done" style="width:100%"></div></div>
  </div>
  <div class="req">
    <div class="req-head"><span class="req-name">핵심교양</span><span class="req-num">12 / 15 <span class="badge badge-red">인문II 3 부족</span></span></div>
    <div class="req-bar"><div class="req-fill" style="width:80%"></div></div>
  </div>
  <div class="req">
    <div class="req-head"><span class="req-name">자유교양</span><span class="req-num">7 / 2 <span class="badge badge-green">충족</span></span></div>
    <div class="req-bar"><div class="req-fill done" style="width:100%"></div></div>
  </div>
  <div class="req">
    <div class="req-head"><span class="req-name">전공</span><span class="req-num">70 / 76 <span class="badge badge-red">6 부족</span></span></div>
    <div class="req-bar"><div class="req-fill" style="width:92.1%"></div></div>
  </div>
  <div class="req" style="margin-bottom:0">
    <div class="req-head"><span class="req-name">일반선택</span><span class="req-num">19 / 20 <span class="badge badge-yellow">초과분으로 충당</span></span></div>
    <div class="req-bar"><div class="req-fill" style="width:95%"></div></div>
  </div>

  <div class="divider"></div>

  <div class="section-label">재수강 2과목 · 2026-2 개설 확인</div>
  <div class="retake">
    <div>
      <div class="retake-name">빅데이터처리와시각화 <span class="badge badge-red">C+</span></div>
      <div class="retake-sub">01 금 09:00~12:00 심지환 · 02 월 15:00~18:00 문현실</div>
    </div>
    <span class="badge badge-blue">2분반</span>
  </div>
  <div class="retake">
    <div>
      <div class="retake-name">소프트웨어적사고 <span class="badge badge-red">B0</span></div>
      <div class="retake-sub">01 월·수 12:00~13:30 박수현 · 작년 2분반 → 올해 1분반</div>
    </div>
    <span class="badge badge-yellow">단일 분반</span>
  </div>
</body>
</html>
