<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Achromatic." />
  <title>Achromatic. Studio</title>
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

    :root {
      --blue: #0055FF;
      --bg: #F2F4F7;
      --card: #FFFFFF;
      --t1: #191919;
      --t2: #8B95A1;
      --t3: #C5CBD3;
      --div: #F0F2F5;
      --bdr: #E5E8EC;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #D8DCE2;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ── APP SHELL ── */
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--div);
      height: 56px;
      padding: 0 12px 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-mark {
      width: 30px; height: 30px;
      background: #191919; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-word {
      font-size: 17px; font-weight: 800;
      color: var(--t1); letter-spacing: -0.5px;
    }
    .top-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      border-radius: 50%; color: var(--t2);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, color 0.1s;
    }
    .top-btn:active { background: var(--div); color: var(--t1); }

    /* ── PAGES ── */
    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .page.on { display: flex; }

    /* ── CONTENT SCROLL ── */
    .content {
      flex: 1; overflow-y: auto;
      padding: 10px 16px calc(64px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 8px;
    }

    /* ── SECTION CARD ── */
    .s-card {
      background: var(--card); border-radius: 16px;
      overflow: hidden;
      animation: up 0.22s ease both;
    }
    .s-head {
      padding: 18px 20px 0;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    /* Claude icon container in section header */
    .s-brand {
      width: 36px; height: 36px;
      background: #FFF0EB;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .s-label {
      font-size: 12px; font-weight: 500;
      color: var(--t2); margin-bottom: 2px; letter-spacing: -0.1px;
    }
    .s-title {
      font-size: 18px; font-weight: 800;
      color: var(--t1); letter-spacing: -0.6px;
    }

    /* ── LIST ROW ── */
    .row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 20px;
      border-top: 1px solid var(--div);
      text-decoration: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .row:active { background: #FAFBFC; }
    .row-ico {
      width: 52px; height: 52px; border-radius: 14px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 25px;
    }
    .row-copy { flex: 1; min-width: 0; }
    .row-name {
      font-size: 15px; font-weight: 600; color: var(--t1);
      letter-spacing: -0.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-desc {
      font-size: 12px; color: var(--t2); margin-top: 3px;
      display: -webkit-box; -webkit-box-orient: vertical;
      -webkit-line-clamp: 1; overflow: hidden;
    }
    .row-date { font-size: 11px; color: var(--t3); margin-top: 3px; }
    .row-btn {
      flex-shrink: 0;
      border: 1.5px solid var(--bdr); border-radius: 20px;
      padding: 7px 15px;
      font-size: 13px; font-weight: 600; color: var(--t1); background: white;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .row-btn:active { background: var(--bg); }

    /* ── EMPTY ── */
    .empty {
      background: var(--card); border-radius: 16px;
      padding: 56px 20px; text-align: center;
      animation: up 0.22s ease both;
    }
    .empty-ico { font-size: 40px; display: block; margin-bottom: 12px; }
    .empty-h { font-size: 16px; font-weight: 700; color: var(--t1); margin-bottom: 6px; }
    .empty-p { font-size: 14px; color: var(--t2); }

    /* ── AI PLACEHOLDER ── */
    .placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px calc(80px + env(safe-area-inset-bottom));
      text-align: center;
    }
    .ph-icon { font-size: 52px; margin-bottom: 20px; }
    .ph-title {
      font-size: 22px; font-weight: 800; color: var(--t1);
      letter-spacing: -0.7px; margin-bottom: 10px;
    }
    .ph-desc { font-size: 14px; color: var(--t2); line-height: 1.7; letter-spacing: -0.1px; }
    .ph-badge {
      margin-top: 24px; display: inline-block;
      background: var(--bg); border-radius: 20px;
      padding: 7px 16px; font-size: 12px; font-weight: 600; color: var(--t2);
    }

    /* ── BOTTOM NAV ── */
    .bot-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      background: var(--card); border-top: 1px solid var(--div);
      display: flex;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .bot-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 0 0;
      font-family: inherit; font-size: 10px; font-weight: 500;
      color: var(--t2); background: none; border: none;
      cursor: pointer; letter-spacing: -0.2px;
      -webkit-tap-highlight-color: transparent;
    }
    .bot-btn.on { color: var(--blue); font-weight: 700; }
    .bot-btn svg { width: 24px; height: 24px; }

    /* ── LACADEMY BANNER ── */
    .la-banner {
      background: linear-gradient(150deg, #0040D0 0%, #0055FF 45%, #3A8AFF 100%);
      border-radius: 20px;
      padding: 20px 20px 18px;
      text-decoration: none; cursor: pointer;
      animation: up 0.22s ease both;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,85,255,0.28);
      -webkit-tap-highlight-color: transparent;
    }
    .la-banner:active { opacity: 0.92; transform: scale(0.99); }
    .la-banner::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%; pointer-events: none;
    }
    .la-banner-chip {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.18);
      padding: 4px 11px; border-radius: 20px;
      margin-bottom: 12px;
    }
    .la-banner-title {
      font-size: 22px; font-weight: 900; color: #FFFFFF;
      letter-spacing: -0.8px; line-height: 1.25; margin-bottom: 7px;
    }
    .la-banner-sub {
      font-size: 12px; color: rgba(255,255,255,0.7);
      letter-spacing: -0.1px; margin-bottom: 16px;
    }
    .la-banner-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .la-banner-date {
      font-size: 11px; color: rgba(255,255,255,0.6);
    }
    .la-banner-cta {
      font-size: 13px; font-weight: 700; color: #FFFFFF;
      display: flex; align-items: center; gap: 3px;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DESKTOP FRAME ── */
    @media (min-width: 420px) {
      body { display: flex; justify-content: center; padding: 24px 0; min-height: 100vh; }
      .app {
        border-radius: 22px; overflow: hidden;
        height: calc(100vh - 48px); min-height: auto;
        box-shadow: 0 16px 56px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.08);
      }
      .bot-nav { border-radius: 0 0 22px 22px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 1.5V16.5M1.5 9H16.5M3.2 3.2l11.6 11.6M14.8 3.2L3.2 14.8"
                stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-word">Achromatic.</span>
    </div>
    <button class="top-btn" onclick="location.reload()" aria-label="새로고침">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
  </header>

  <!-- PAGE: 홈 -->
  <div class="page on" id="page-home">
    <div class="content" id="home-content"></div>
  </div>

  <!-- PAGE: 파일 -->
  <div class="page" id="page-files">
    <div class="content" id="files-content"></div>
  </div>

  <!-- PAGE: AI -->
  <div class="page" id="page-ai">
    <div class="placeholder">
      <div class="ph-icon">
        <!-- Spark / AI icon -->
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="16" fill="#F0F4FF"/>
          <path d="M26 12l2.5 8.5L37 23l-8.5 2.5L26 34l-2.5-8.5L15 23l8.5-2.5L26 12z"
                fill="#0064FF" opacity="0.9"/>
          <circle cx="36" cy="34" r="3" fill="#0064FF" opacity="0.4"/>
          <circle cx="18" cy="36" r="2" fill="#0064FF" opacity="0.25"/>
        </svg>
      </div>
      <div class="ph-title">AI 리소스</div>
      <div class="ph-desc">유용한 AI 도구 · 링크 · 레퍼런스를<br>여기 모아둘 예정이에요</div>
      <div class="ph-badge">준비 중</div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bot-nav" id="bot-nav">
    <button class="bot-btn on" data-p="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      홈
    </button>
    <button class="bot-btn" data-p="files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
        <polyline points="13 2 13 9 20 9"/>
      </svg>
      파일
    </button>
    <button class="bot-btn" data-p="ai">
      <!-- Spark icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      AI
    </button>
  </nav>

</div>

<script>
/* ── CLAUDE ICON SVG (Anthropic-style starburst, orange) ── */
const CLAUDE_ICON = `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
  <g transform="translate(11,11)">
    <rect x="-2.3" y="-9" width="4.6" height="6.4" rx="2.3" fill="#D97757" transform="rotate(0)"/>
    <rect x="-2.3" y="-9" width="4.6" height="6.4" rx="2.3" fill="#D97757" transform="rotate(60)"/>
    <rect x="-2.3" y="-9" width="4.6" height="6.4" rx="2.3" fill="#D97757" transform="rotate(120)"/>
    <rect x="-2.3" y="-9" width="4.6" height="6.4" rx="2.3" fill="#D97757" transform="rotate(180)"/>
    <rect x="-2.3" y="-9" width="4.6" height="6.4" rx="2.3" fill="#D97757" transform="rotate(240)"/>
    <rect x="-2.3" y="-9" width="4.6" height="6.4" rx="2.3" fill="#D97757" transform="rotate(300)"/>
  </g>
</svg>`;

/* ── ICON CONFIG ── */
const iconOf = (f) => {
  const p = (f.path || '').toLowerCase();
  if (p.includes('lacademy'))
    return { bg: 'linear-gradient(135deg,#FF6B35,#FFB347)', ico: '📊' };
  if (/accountex|london|fintech|regtech|mpts/.test(p))
    return { bg: 'linear-gradient(135deg,#0064FF,#4DA3FF)', ico: '🗺️' };
  const MAP = {
    report:       { bg: 'linear-gradient(135deg,#FF6B35,#FFB347)', ico: '📊' },
    presentation: { bg: 'linear-gradient(135deg,#7C3AED,#A78BFA)', ico: '📑' },
    analysis:     { bg: 'linear-gradient(135deg,#0EA5E9,#67E8F9)', ico: '🔍' },
    landing:      { bg: 'linear-gradient(135deg,#F59E0B,#FCD34D)', ico: '🌐' },
    portfolio:    { bg: 'linear-gradient(135deg,#1A1A2E,#4B5563)', ico: '💼' },
  };
  return MAP[(f.tags?.[0] || '').toLowerCase()]
    || { bg: 'linear-gradient(135deg,#374151,#6B7280)', ico: '📄' };
};

const catOf = (f) => {
  const p = (f.path || '').toLowerCase();
  if (p.includes('lacademy')) return 'freelance';
  return 'claude'; // everything else = Claude output
};

const dateFmt = (s) => {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getMonth() + 1}월 ${d.getDate()}일`;
};

/* ── COMPONENTS ── */
const makeRow = (f) => {
  const s = iconOf(f);
  const a = document.createElement('a');
  a.className = 'row';
  a.href = `./${f.path}`;
  a.target = '_blank';
  a.rel = 'noopener';
  a.innerHTML = `
    <div class="row-ico" style="background:${s.bg}">${s.ico}</div>
    <div class="row-copy">
      <div class="row-name">${f.title}</div>
      <div class="row-desc">${f.description || ''}</div>
      <div class="row-date">${dateFmt(f.date)}</div>
    </div>
    <button class="row-btn">열기</button>
  `;
  a.querySelector('.row-btn').onclick = e => {
    e.preventDefault(); window.open(a.href, '_blank');
  };
  return a;
};

const makeCard = ({ label, title, files, brand = false, delay = 0 }) => {
  const d = document.createElement('div');
  d.className = 's-card';
  d.style.animationDelay = `${delay}s`;

  const head = document.createElement('div');
  head.className = 's-head';
  head.innerHTML = `
    ${brand ? `<div class="s-brand">${CLAUDE_ICON}</div>` : ''}
    <div>
      <div class="s-label">${label}</div>
      <div class="s-title">${title}</div>
    </div>
  `;
  d.appendChild(head);
  files.forEach(f => d.appendChild(makeRow(f)));
  return d;
};

const makeEmpty = (ico, h, p, delay = 0) => {
  const d = document.createElement('div');
  d.className = 'empty';
  d.style.animationDelay = `${delay}s`;
  d.innerHTML = `<span class="empty-ico">${ico}</span>
    <div class="empty-h">${h}</div><div class="empty-p">${p}</div>`;
  return d;
};

/* ── RENDER ── */
let FILES = [];

const renderHome = () => {
  const c = document.getElementById('home-content');
  c.innerHTML = '';

  // 라카데미 배너
  const freelance = FILES.filter(f => catOf(f) === 'freelance');
  const latestLa = freelance.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
  const bannerSub = latestLa
    ? `최신 보고서 · ${latestLa.date} 업데이트`
    : '숏폼 성과 분석 보고서';

  const bannerTitle = latestLa ? latestLa.title : '최신 숏폼 성과';
  const bannerDesc  = latestLa ? latestLa.description : '숏폼 성과 분석 보고서';
  const bannerDate  = latestLa ? dateFmt(latestLa.date) : '';

  const banner = document.createElement('a');
  banner.className = 'la-banner';
  banner.href = './lacademy.html';
  banner.innerHTML = `
    <div class="la-banner-chip">라카데미 여의도 · 최신 보고서</div>
    <div class="la-banner-title">${bannerTitle}</div>
    <div class="la-banner-sub">${bannerDesc}</div>
    <div class="la-banner-footer">
      <span class="la-banner-date">${bannerDate}</span>
      <span class="la-banner-cta">보고서 보기
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </span>
    </div>
  `;
  c.appendChild(banner);

  if (!FILES.length) {
    c.appendChild(makeEmpty('📭', '아직 자료가 없어요', '곧 업데이트할게요'));
    return;
  }
  const sorted = [...FILES].sort((a, b) => new Date(b.date) - new Date(a.date));
  c.appendChild(makeCard({
    label: '이번 주 업데이트',
    title: '최신 자료',
    files: sorted.slice(0, 5),
    delay: 0.06
  }));
};

const renderFiles = () => {
  const c = document.getElementById('files-content');
  c.innerHTML = '';

  const claudeFiles = FILES
    .filter(f => catOf(f) === 'claude')
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  const freelanceFiles = FILES
    .filter(f => catOf(f) === 'freelance')
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  if (claudeFiles.length) {
    c.appendChild(makeCard({
      label: 'Claude와 함께 만든 파일',
      title: 'Claude 파일',
      files: claudeFiles,
      brand: true,
      delay: 0
    }));
  }

  if (freelanceFiles.length) {
    const fCard = makeCard({
      label: '라카데미 여의도',
      title: '프리랜서 자료',
      files: freelanceFiles,
      brand: false,
      delay: 0.06
    });
    // 섹션 헤더에 "전체 보기" 링크 추가
    const sHead = fCard.querySelector('.s-head');
    const moreBtn = document.createElement('a');
    moreBtn.href = './lacademy.html';
    moreBtn.style.cssText = 'font-size:13px;color:var(--t2);text-decoration:none;padding-bottom:2px;';
    moreBtn.textContent = '전체 보기 ›';
    sHead.appendChild(moreBtn);
    c.appendChild(fCard);
  }

  if (!claudeFiles.length && !freelanceFiles.length) {
    c.appendChild(makeEmpty('📭', '아직 파일이 없어요', '자료를 추가하면 여기 표시돼요'));
  }
};

/* ── PAGE SWITCH ── */
const showPage = (p) => {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.bot-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(`page-${p}`).classList.add('on');
  document.querySelector(`.bot-btn[data-p="${p}"]`).classList.add('on');
};

document.getElementById('bot-nav').addEventListener('click', e => {
  const btn = e.target.closest('.bot-btn');
  if (btn) showPage(btn.dataset.p);
});

/* ── LOAD (file:// fallback 포함) ── */
const FALLBACK = [
  { title: '라카데미 숏폼 분석 보고서 0516', path: 'lacademy-0516-report.html',
    date: '2026-05-16', description: 'IG 1.6만뷰 · 공유 96 · 팔로우 +20 · 합산 17,328', tags: ['report'] },
  { title: '라카데미 숏폼 분석 보고서 0514', path: 'lacademy-0514-report.html',
    date: '2026-05-14', description: 'YT 13,458 · IG 12.2만 · 구독자 377명', tags: ['report'] },
  { title: 'Accountex 2026 브리핑', path: 'accountex-2026-briefing.html',
    date: '2026-05-12', description: '런던 핀테크 탐방', tags: ['report'] },
];

fetch('./manifest.json')
  .then(r => r.json())
  .then(d => { FILES = d.files || []; renderHome(); renderFiles(); })
  .catch(() => { FILES = FALLBACK; renderHome(); renderFiles(); });
</script>
</body>
